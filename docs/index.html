  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #15171c;
      font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif; color: #eaecef; }
    #scene { position: fixed; inset: 0; }
    #scene canvas { display: block; }

    /* 起動時のローディング */
    #loading { position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #15171c; z-index: 50; font-size: 15px;
      letter-spacing: .04em; }
    #loading .err { color: #ff8080; text-align: center; line-height: 1.7; }

    /* ホバー時の作品名 HUD */
    #hud { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(12px);
      background: rgba(20,23,28,.85); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.08); border-radius: 10px;
      padding: 8px 10px 8px 18px; font-size: 14px; opacity: 0; pointer-events: none;
      transition: opacity .18s, transform .18s; white-space: nowrap; max-width: 92vw;
      display: flex; align-items: center; gap: 14px; }
    #hud.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #hud .by { color: #9aa3b2; margin-left: 6px; }
    #hud #hud-text { overflow: hidden; text-overflow: ellipsis; }
    #hud .hint { color: #8d96a8; font-size: 12px; }
    #hud-zoom { pointer-events: auto; cursor: pointer; flex: none;
      background: #c9a44c; color: #1a1408; border: 0; border-radius: 7px;
      padding: 7px 15px; font-size: 13px; letter-spacing: .04em; transition: background .15s; }
    #hud-zoom:hover { background: #dcc079; }

    /* 操作ヒント(画面隅) */
    #help { position: fixed; top: 52px; left: 16px; font-size: 12px; color: #8b93a4;
      line-height: 1.6; pointer-events: none; }

    /* モード切替ボタン */
    /* 上部の操作ボタン(共通の上品なスタイル) */
    #mode-toggle, #quality-toggle, #entrance-back {
      position: fixed; z-index: 20; cursor: pointer;
      background: rgba(14,15,19,.72); backdrop-filter: blur(10px);
      border: 1px solid rgba(201,164,76,.30); border-radius: 999px;
      padding: 8px 18px; font-size: 12px; letter-spacing: .14em; color: #e6e2d6;
      transition: border-color .15s, background .15s, color .15s; }
    #mode-toggle:hover, #quality-toggle:hover, #entrance-back:hover {
      border-color: #c9a44c; color: #f4efe3; background: rgba(22,24,29,.85); }
    #mode-toggle { top: 16px; right: 18px; }
    #quality-toggle { top: 58px; right: 18px; display: none; padding: 6px 14px; font-size: 11px; color: #c8c2b2; }
    #quality-toggle.show { display: block; }

    /* バーチャルコントローラ(スマホ用ジョイスティック) */
    #joystick { position: fixed; left: 24px; bottom: 24px; width: 124px; height: 124px;
      border-radius: 50%; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.18);
      z-index: 18; display: none; touch-action: none; }
    #joystick.show { display: block; }
    #joystick-knob { position: absolute; left: 50%; top: 50%; width: 54px; height: 54px;
      border-radius: 50%; transform: translate(-50%, -50%);
      background: rgba(255,255,255,.26); border: 1px solid rgba(255,255,255,.45); }

    /* 一人称モードの照準(十字) */
    #crosshair { position: fixed; top: 50%; left: 50%; width: 18px; height: 18px;
      transform: translate(-50%, -50%); opacity: 0; pointer-events: none; z-index: 10; }
    #crosshair.show { opacity: .8; }
    #crosshair::before, #crosshair::after { content: ""; position: absolute;
      background: rgba(255,255,255,.85); }
    #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
    #crosshair::after { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }

    /* 入口(ロビー): 展示を選ぶ */
    #entrance { position: fixed; inset: 0; z-index: 30; display: none; flex-direction: column;
      align-items: center; justify-content: safe center; gap: 26px; padding: 40px;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      background: radial-gradient(1200px 800px at 50% 30%, #16181d 0%, #0a0b0d 70%); }
    #entrance.show { display: flex; }
    /* 展示数が多い時は中身を上詰めにしてスクロール可能に */
    #entrance.scroll { justify-content: flex-start; }
    #entrance-cards { max-height: none; }
    #entrance h1 { margin: 0; font-size: 30px; font-weight: 400; letter-spacing: .18em; text-align: center;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", Georgia, serif; color: #f1ece1; }
    #entrance h1::after { content: ""; display: block; width: 44px; height: 1px; margin: 16px auto 0;
      background: linear-gradient(90deg, transparent, #c9a44c, transparent); }
    #entrance .lead { margin: 2px 0 6px; font-size: 12px; color: #9aa3b2; letter-spacing: .14em; }
    #entrance-modes, #entrance-chars { display: flex; gap: 10px; }
    #entrance-chars { margin-top: -8px; }
    .mode-pick { background: rgba(255,255,255,.06); color: #c4cad6; cursor: pointer;
      border: 1px solid rgba(255,255,255,.14); border-radius: 999px; padding: 8px 18px; font-size: 13px; }
    .mode-pick.on { background: rgba(201,164,76,.16); color: #e9d6a6; border-color: #c9a44c; }
    #entrance-cards { display: flex; gap: 22px; flex-wrap: wrap; justify-content: center; max-width: 980px; }
    #entrance-enter { margin-top: 8px; background: #c9a44c; color: #1a1408; border: 0; cursor: pointer;
      border-radius: 999px; padding: 13px 40px; font-size: 15px; font-weight: 600; letter-spacing: .08em;
      transition: background .15s, transform .15s; }
    #entrance-enter:hover { background: #dcc079; transform: translateY(-1px); }
    #entrance-url { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center;
      margin-top: 10px; max-width: 720px; }
    #entrance-url .lbl { font-size: 12px; color: #9aa3b2; width: 100%; text-align: center; }
    #entrance-url-input { flex: 1; min-width: 320px; background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.16); border-radius: 8px; padding: 9px 12px; color: #eaecef; font-size: 13px; }
    #entrance-url-go { background: rgba(255,255,255,.1); color: #eaecef; cursor: pointer;
      border: 1px solid rgba(255,255,255,.18); border-radius: 8px; padding: 9px 16px; font-size: 13px; }
    #entrance-url-go:hover { background: rgba(255,255,255,.2); }
    #entrance-url-example { margin-top: 8px; background: none; border: 0; cursor: pointer;
      color: #9aa3b2; font-size: 12px; letter-spacing: .04em; text-decoration: underline;
      text-underline-offset: 3px; transition: color .15s; }
    #entrance-url-example:hover { color: #d8bd78; }
    /* 使い方動画カード(サムネ + 再生ボタン) */
    #entrance-tut { position: relative; margin-top: 14px; width: 360px; max-width: 86vw; aspect-ratio: 16 / 9;
      flex: none; padding: 0; cursor: pointer; overflow: hidden; border-radius: 12px; color: #fff;
      border: 1px solid rgba(201,164,76,.35); background-size: cover; background-position: center;
      box-shadow: 0 8px 28px rgba(0,0,0,.45); transition: transform .15s, border-color .15s; }
    #entrance-tut:hover { transform: translateY(-2px); border-color: #c9a44c; }
    #entrance-tut::after { content: ""; position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.6), rgba(0,0,0,.04) 55%); }
    #entrance-tut .play { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 2;
      width: 56px; height: 56px; border-radius: 50%; background: rgba(201,164,76,.94); color: #1a1408;
      display: flex; align-items: center; justify-content: center; font-size: 21px; padding-left: 3px;
      box-shadow: 0 4px 14px rgba(0,0,0,.4); }
    #entrance-tut .cap { position: absolute; left: 13px; bottom: 10px; z-index: 2; font-size: 12.5px;
      letter-spacing: .06em; color: #f4efe3; text-shadow: 0 1px 4px rgba(0,0,0,.7); }
    /* 使い方動画モーダル */
    #tut-modal { position: fixed; inset: 0; z-index: 120; display: none; align-items: center;
      justify-content: center; padding: 4vmin; background: rgba(6,7,9,.86); backdrop-filter: blur(6px); }
    #tut-modal.show { display: flex; }
    #tut-frame { width: min(1100px, 94vw); aspect-ratio: 16 / 9; max-height: 88vh; border-radius: 12px;
      overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.6); border: 1px solid rgba(201,164,76,.25); }
    #tut-embed, #tut-embed iframe { width: 100%; height: 100%; border: 0; display: block; }
    #tut-close { position: absolute; top: 20px; right: 22px; width: 42px; height: 42px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,.18); background: rgba(12,13,16,.7); color: #eaecef; font-size: 22px;
      line-height: 1; cursor: pointer; }
    #tut-close:hover { background: rgba(40,44,52,.9); }
    .ex-card { position: relative; width: 300px; height: 210px; border-radius: 14px; overflow: hidden;
      border: 1px solid rgba(255,255,255,.12); cursor: pointer; padding: 0; color: #fff;
      background-size: cover; background-position: center; background-color: #1b1e24;
      transition: transform .15s, border-color .15s; }
    .ex-card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,.35); }
    .ex-card.on { border-color: #c9a44c; box-shadow: 0 0 0 1px #c9a44c, 0 8px 28px rgba(0,0,0,.5); }
    .ex-card .ex-meta { position: absolute; inset: auto 0 0 0; text-align: left; padding: 14px 16px;
      background: linear-gradient(to top, rgba(8,9,11,.92), rgba(8,9,11,0)); }
    .ex-card .ex-title { font-size: 17px; font-weight: 700; }
    .ex-card .ex-sub { font-size: 12px; color: #c4cad6; margin-top: 3px; }

    /* Enter VR ボタン(VRButton 既定の下部中央 → 上部中央へ。HUD と重ねない) */
    #vr-button { top: 14px !important; bottom: auto !important; }
    /* ロビー(入口)では隠す。空の部屋で VR に入って真っ暗になるのを防ぐ。 */
    #vr-button.vr-hidden { display: none !important; }

    /* 入口に戻るボタン */
    #entrance-back { top: 16px; left: 18px; display: none; }
    #entrance-back.show { display: block; }

    /* 一人称モードの開始プロンプト */
    #walk-prompt { position: fixed; inset: 0; z-index: 15; display: none;
      align-items: center; justify-content: center; flex-direction: column; gap: 8px;
      background: rgba(10,11,13,.55); cursor: pointer; }
    #walk-prompt.show { display: flex; }
    #walk-prompt .big { font-size: 18px; letter-spacing: .05em; }
    #walk-prompt .sub { font-size: 13px; color: #9aa3b2; }

    /* 深ズーム(OpenSeadragon)オーバーレイ */
    #osd-overlay { position: fixed; inset: 0; z-index: 100; background: #0c0d10;
      display: none; }
    #osd-overlay.show { display: block; }
    #osd { position: absolute; inset: 0; }
    #osd-title { position: absolute; top: 16px; left: 20px; z-index: 2; font-size: 15px;
      background: rgba(12,13,16,.6); padding: 8px 14px; border-radius: 8px; max-width: 70vw;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #osd-title .by { color: #9aa3b2; margin-left: 8px; font-size: 13px; }
    #osd-close { position: absolute; top: 16px; right: 18px; z-index: 4; width: 40px; height: 40px;
      border-radius: 50%; border: 1px solid rgba(255,255,255,.15); background: rgba(12,13,16,.6);
      color: #eaecef; font-size: 22px; cursor: pointer; line-height: 1; }
    #osd-close:hover { background: rgba(40,44,52,.9); }
    #osd-info { position: absolute; top: 16px; right: 66px; z-index: 4; width: 40px; height: 40px;
      border-radius: 50%; border: 1px solid rgba(201,164,76,.35); background: rgba(12,13,16,.6);
      color: #d8bd78; font-size: 19px; cursor: pointer; line-height: 38px; text-align: center;
      font-family: "Hiragino Mincho ProN", Georgia, serif; font-style: italic; transition: border-color .15s; }
    #osd-info:hover { border-color: #c9a44c; background: rgba(22,24,29,.85); }
    /* 権利・メタデータ パネル(右からスライドイン) */
    #osd-panel { position: absolute; top: 0; right: 0; bottom: 0; width: 360px; max-width: 86vw; z-index: 3;
      background: rgba(12,13,16,.94); backdrop-filter: blur(10px); border-left: 1px solid rgba(201,164,76,.25);
      transform: translateX(100%); transition: transform .25s ease; overflow-y: auto;
      padding: 64px 22px 24px; font-size: 13px; line-height: 1.7; color: #d7d9de; }
    #osd-panel.show { transform: translateX(0); }
    #osd-panel h3 { margin: 0 0 4px; font-size: 17px; font-weight: 400; color: #f1ece1;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", Georgia, serif; letter-spacing: .04em; }
    #osd-panel .by { color: #9aa3b2; font-size: 12px; margin-bottom: 14px; }
    #osd-panel .sec { margin-top: 16px; }
    #osd-panel .sec > .k { color: #c9a44c; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; }
    #osd-panel .md { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; margin-top: 6px; }
    #osd-panel .md .k { color: #9aa3b2; }
    #osd-panel a { color: #d8bd78; text-decoration: none; word-break: break-all; }
    #osd-panel a:hover { text-decoration: underline; }
  </style>

  <!-- Three.js は import map 経由 (ESM)。OpenSeadragon は UMD グローバル。 -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/openseadragon@4.1/build/openseadragon/openseadragon.min.js"></script>
</head>
<body>
  <div id="scene"></div>

  <div id="help" data-i18n-html="helpHtml"></div>

  <button id="mode-toggle" data-i18n="toWalk">歩く</button>
  <button id="quality-toggle" title="画質 / Quality"></button>
  <button id="entrance-back" data-i18n="back">← 入口</button>
  <div id="crosshair"></div>
  <div id="walk-prompt">
    <div class="big" data-i18n="walkBig">クリックで歩行開始</div>
    <div class="sub" data-i18n="walkSub"></div>
  </div>

  <div id="joystick"><div id="joystick-knob"></div></div>

  <div id="hud"><span id="hud-text"></span><button id="hud-zoom" data-i18n="zoom">🔍 拡大</button></div>
  <div id="loading" data-i18n="loading">読み込み中…</div>

  <div id="entrance">
    <h1 data-i18n="appTitle">IIIF バーチャル美術館</h1>
    <div class="lead" data-i18n="entranceLead"></div>
    <button id="entrance-tut" type="button" hidden aria-label="tutorial"></button>
    <div id="entrance-modes"></div>
    <div id="entrance-chars"></div>
    <div id="entrance-cards"></div>
    <button id="entrance-enter" data-i18n="enter">入室する →</button>
    <form id="entrance-url" autocomplete="off">
      <span class="lbl" data-i18n="urlLabel"></span>
      <input id="entrance-url-input" type="url" data-i18n-ph="urlPlaceholder" />
      <button id="entrance-url-go" type="submit" data-i18n="urlLoad">Load</button>
    </form>
    <button id="entrance-url-example" type="button" hidden data-i18n="urlExample"></button>
  </div>

  <!-- 使い方動画(YouTube埋め込み)モーダル -->
  <div id="tut-modal">
    <button id="tut-close" title="閉じる (Esc)">×</button>
    <div id="tut-frame"><div id="tut-embed"></div></div>
  </div>

  <div id="osd-overlay">
    <div id="osd"></div>
    <div id="osd-title"></div>
    <button id="osd-info" title="情報 / Info">i</button>
    <button id="osd-close" title="閉じる (Esc)">×</button>
    <div id="osd-panel"></div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
