<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#16181d"/>
      <stop offset="70%" stop-color="#0a0b0d"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e7cf8f"/>
      <stop offset="50%" stop-color="#c9a44c"/>
      <stop offset="100%" stop-color="#9a7a31"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a44c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c9a44c"/>
      <stop offset="100%" stop-color="#c9a44c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 床面の微光 -->
  <ellipse cx="600" cy="600" rx="520" ry="60" fill="#c9a44c" opacity="0.05"/>

  <!-- 左：金縁の額に収まった作品 -->
  <g transform="translate(150 150)">
    <rect x="-10" y="-10" width="280" height="330" rx="4" fill="url(#gold)"/>
    <rect x="6" y="6" width="248" height="298" fill="#0e0f13"/>
    <circle cx="170" cy="95" r="46" fill="#dcc079" opacity="0.92"/>
    <path d="M6 304 L80 190 L150 250 L210 150 L254 220 L254 304 Z" fill="#5f4d27"/>
    <path d="M6 304 L120 240 L200 280 L254 250 L254 304 Z" fill="#3c3119"/>
  </g>

  <!-- 右：タイトル -->
  <g transform="translate(520 230)">
    <text x="0" y="0" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans CJK JP',sans-serif"
          font-size="78" font-weight="700" fill="#f4efe3" letter-spacing="2">IIIF VR Gallery</text>
    <rect x="2" y="34" width="120" height="3" fill="url(#rule)"/>
    <text x="0" y="92" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans CJK JP',sans-serif"
          font-size="34" font-weight="400" fill="#cfd4de">IIIF を 3D 仮想美術館で歩いて鑑賞</text>
    <text x="0" y="150" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans CJK JP',sans-serif"
          font-size="25" font-weight="400" fill="#9aa3b2">Walk any IIIF collection in 3D · deep-zoom each work</text>
  </g>
</svg>
